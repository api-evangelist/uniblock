naftiko: "1.0.0-alpha1"

info:
  label: "Uniblock Unified API"
  description: "Single standardized interface for token metadata, NFT data, transactions, and market data across 300+ blockchains."
  tags:
    - Uniblock
    - Blockchain
    - Web3
    - Tokens
    - NFTs
    - Market Data
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIBLOCK_API_KEY: UNIBLOCK_API_KEY

capability:
  consumes:
    - type: http
      namespace: uniblock-unified
      baseUri: https://api.uniblock.dev/uni/v1
      description: "Uniblock Unified API — multi-chain token, NFT, transaction, and market data"
      authentication:
        type: apikey
        key: x-api-key
        value: "{{UNIBLOCK_API_KEY}}"
        placement: header
      resources:
        - name: token-metadata
          path: /token/metadata
          description: "Fungible token metadata"
          operations:
            - name: get-token-metadata
              method: GET
              description: "Get token metadata including name, symbol, and decimals"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network identifier"
                - name: contractAddress
                  in: query
                  type: string
                  required: true
                  description: "Token contract address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: token-balance
          path: /token/balance
          description: "Token balances for a wallet address"
          operations:
            - name: get-token-balances
              method: GET
              description: "Get native and fungible token balances for a wallet"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network"
                - name: address
                  in: query
                  type: string
                  required: true
                  description: "Wallet address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nft-balance
          path: /nft/balance
          description: "NFT balances for a wallet"
          operations:
            - name: get-nft-balances
              method: GET
              description: "Get NFTs held by a wallet address"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network"
                - name: address
                  in: query
                  type: string
                  required: true
                  description: "Wallet address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nft-metadata
          path: /nft/metadata
          description: "NFT token metadata"
          operations:
            - name: get-nft-metadata
              method: GET
              description: "Get metadata for a specific NFT"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network"
                - name: contractAddress
                  in: query
                  type: string
                  required: true
                  description: "NFT contract address"
                - name: tokenId
                  in: query
                  type: string
                  required: true
                  description: "Token ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: transactions
          path: /transaction
          description: "Transaction history for a wallet"
          operations:
            - name: get-transactions
              method: GET
              description: "Get transactions for a wallet address"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network"
                - name: address
                  in: query
                  type: string
                  required: true
                  description: "Wallet address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: market-price
          path: /market/price
          description: "Token market price data"
          operations:
            - name: get-market-price
              method: GET
              description: "Get current token price"
              inputParameters:
                - name: chain
                  in: query
                  type: string
                  required: true
                  description: "Blockchain network"
                - name: contractAddress
                  in: query
                  type: string
                  required: true
                  description: "Token contract address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: uniblock-unified-rest
      resources:
        - path: /v1/tokens/metadata
          name: token-metadata
          description: "Token metadata"
          operations:
            - method: GET
              name: get-token-metadata
              description: "Get token metadata"
              call: "uniblock-unified.get-token-metadata"
              with:
                chain: "rest.chain"
                contractAddress: "rest.contractAddress"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tokens/balances
          name: token-balances
          description: "Token balances"
          operations:
            - method: GET
              name: get-token-balances
              description: "Get token balances"
              call: "uniblock-unified.get-token-balances"
              with:
                chain: "rest.chain"
                address: "rest.address"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/nfts
          name: nft-balances
          description: "NFT holdings"
          operations:
            - method: GET
              name: get-nft-balances
              description: "Get NFT balances"
              call: "uniblock-unified.get-nft-balances"
              with:
                chain: "rest.chain"
                address: "rest.address"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/transactions
          name: transactions
          description: "Transaction history"
          operations:
            - method: GET
              name: get-transactions
              description: "Get transactions"
              call: "uniblock-unified.get-transactions"
              with:
                chain: "rest.chain"
                address: "rest.address"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: uniblock-unified-mcp
      transport: http
      tools:
        - name: get-token-metadata
          description: "Get token metadata including name, symbol, and decimals"
          hints:
            readOnly: true
            openWorld: true
          call: "uniblock-unified.get-token-metadata"
          with:
            chain: "tools.chain"
            contractAddress: "tools.contractAddress"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-token-balances
          description: "Get token balances for a wallet address"
          hints:
            readOnly: true
            openWorld: false
          call: "uniblock-unified.get-token-balances"
          with:
            chain: "tools.chain"
            address: "tools.address"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-nft-balances
          description: "Get NFTs held by a wallet address"
          hints:
            readOnly: true
            openWorld: false
          call: "uniblock-unified.get-nft-balances"
          with:
            chain: "tools.chain"
            address: "tools.address"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-nft-metadata
          description: "Get metadata for a specific NFT by contract and token ID"
          hints:
            readOnly: true
            openWorld: true
          call: "uniblock-unified.get-nft-metadata"
          with:
            chain: "tools.chain"
            contractAddress: "tools.contractAddress"
            tokenId: "tools.tokenId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-transactions
          description: "Get transaction history for a wallet address"
          hints:
            readOnly: true
            openWorld: false
          call: "uniblock-unified.get-transactions"
          with:
            chain: "tools.chain"
            address: "tools.address"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-market-price
          description: "Get current market price for a token"
          hints:
            readOnly: true
            openWorld: true
          call: "uniblock-unified.get-market-price"
          with:
            chain: "tools.chain"
            contractAddress: "tools.contractAddress"
          outputParameters:
            - type: object
              mapping: "$."
