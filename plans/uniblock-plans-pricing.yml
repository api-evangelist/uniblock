specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Uniblock
providerId: uniblock
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Blockchain
  - Web3
  - JSON-RPC
  - Multi-Chain
description: Uniblock is priced on a tiered subscription model with per-second compute-unit (CU/s)
  rate limits and a monthly compute-unit envelope per project. Plans scale by CU allowance, parallel
  rate, and the number of permitted projects, with an enterprise tier for custom throughput, dedicated
  nodes, and SLAs.
sources:
  - https://uniblock.dev/pricing
  - https://docs.uniblock.dev/guides/uniblock/rate-limits
plans:
  - id: uniblock-startup
    name: Startup
    type: freemium
    description: Free entry tier capped at 40 million compute units per month with 1,000 CU/s.
    entries:
      - label: Compute Units
        name: compute_units
        type: quota
        metric: compute_unit
        limit: 40000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Rate
        name: rate
        type: tiered
        metric: compute_units_per_second
        limit: 1000
        timeFrame: second
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Projects
        name: projects
        type: quota
        metric: project
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Basic Routing
      - name: Provider Management
      - name: Auto Backups
